name: Weekly Industry Digest

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # 08:00 UTC = 09:00 CET (winter) / 10:00 CEST (summer)
    # 09:00 UTC = 10:00 CET (winter) / 11:00 CEST (summer)
    # Pick whichever is closer to 10:00 CET for your needs.
    # Below targets ~10:00 CET / 11:00 CEST. Adjust if needed.
    - cron: "0 9 * * 5"
  workflow_dispatch: {}   # allows manual "Run workflow" button for testing

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python digest.py
